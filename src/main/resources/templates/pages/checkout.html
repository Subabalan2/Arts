<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Checkout')}"></head>
<body>

<nav th:replace="~{fragments/layout :: navbar(${cartCount})}"></nav>

<section class="checkout-section">
    <h1>Checkout</h1>

    <div class="checkout-grid">
        <!-- FORM -->
        <form th:action="@{/cart/checkout/confirm}" method="post" class="checkout-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="phone" placeholder="+91 9876543210">
            </div>
            <div class="form-group">
                <label>Shipping Address</label>
                <textarea name="address" required class="form-control"
                          placeholder="Street, City, State, Pincode..."></textarea>
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" placeholder="City" required>
            </div>
            <div class="form-group">
                <label>PIN Code</label>
                <input type="text" name="pincode" placeholder="600001" required>
            </div>

            <p class="checkout-note">
                💳 Payment gateway (Razorpay / UPI) integration coming soon.
                Currently orders will be confirmed and we'll contact you for payment.
            </p>

            <button type="submit" class="btn-primary">PLACE ORDER</button>
        </form>

        <!-- ORDER SUMMARY -->
        <div class="checkout-summary">
            <h3>Order Summary</h3>
            <div th:each="item : ${cartItems}" class="summary-item">
                <span th:text="${item.title}">Title</span>
                <span>₹<span th:text="${#numbers.formatDecimal(item.subtotal,1,'COMMA',0,'POINT')}">0</span></span>
            </div>
            <div class="summary-item">
                <span>Shipping</span>
                <span>Free</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span>₹<span th:text="${#numbers.formatDecimal(total,1,'COMMA',0,'POINT')}">0</span></span>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
