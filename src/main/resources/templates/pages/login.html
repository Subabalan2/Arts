
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{fragments/layout :: head('Login - SSartz Gallery')}"></head>

<body class="bg-dark text-white">

<nav th:replace="~{fragments/layout :: navbar(0)}"></nav>

<section class="login-section">

    <!-- LOGIN FORM -->
    <div class="login-form-area">

        <div class="login-box">

            <div class="login-header">
                <p class="auth-label">AUTHENTICATION</p>
                <h2>User <em>Login</em></h2>
            </div>

            <div th:if="${param.error}" class="login-error">
                <i class="fas fa-exclamation-circle"></i>
                Invalid credentials. Please try again.
            </div>

            <form th:action="@{/login}" method="post" class="login-form">

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="username" placeholder="artist@ssartz.com" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">
                    SIGN IN TO GALLERY
                </button>

            </form>

            <p class="register-text">
                New to SSartz?
                <a th:href="@{/register}">Create an account</a>
            </p>

        </div>

    </div>


    <!-- IMAGE SIDE -->
    <div class="login-visual">

        <img th:src="@{/images/96image.jpeg}" alt="Artwork">

        <div class="login-overlay"></div>

        <div class="login-visual-text">

            <div class="gold-line"></div>

            <h3>
                Unveiling the <br>
                <em>Hidden Canvas</em>
            </h3>

            <p>
                Every login is a new journey into the world of curated masterpieces.
                Welcome to the soul of art.
            </p>

        </div>

    </div>

</section>


<style>

    /* ===== SECTION LAYOUT ===== */

    .login-section{
    display:flex;
    min-height:100vh;
    width:100%;
    }

    /* ===== FORM SIDE ===== */

    .login-form-area{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:60px 20px;
    background:#07070a;
    }

    .login-box{
    width:100%;
    max-width:380px;
    }

    .login-header{
    margin-bottom:40px;
    }

    .auth-label{
    letter-spacing:4px;
    color:#c8a951;
    font-size:0.75rem;
    font-weight:bold;
    margin-bottom:10px;
    }

    .login-header h2{
    font-family:'Playfair Display',serif;
    font-size:2.8rem;
    line-height:1.1;
    color:#f0ead8;
    }

    .login-header em{
    color:#c8a951;
    font-style:italic;
    }

    /* ===== ERROR ===== */

    .login-error{
    background:rgba(255,77,77,0.1);
    color:#ff4d4d;
    padding:12px 16px;
    border-radius:8px;
    margin-bottom:25px;
    font-size:0.85rem;
    border:1px solid rgba(255,77,77,0.2);
    display:flex;
    gap:10px;
    align-items:center;
    }

    /* ===== FORM ===== */

    .login-form{
    display:flex;
    flex-direction:column;
    gap:20px;
    }

    .input-group{
    display:flex;
    flex-direction:column;
    gap:8px;
    }

    .input-group label{
    color:#8c8575;
    font-size:0.7rem;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-weight:600;
    }

    .input-group input{
    background:#121217;
    border:1px solid rgba(255,255,255,0.05);
    padding:14px 18px;
    border-radius:12px;
    color:#f0ead8;
    outline:none;
    transition:0.3s;
    }

    input:focus{
    border-color:rgba(200,169,81,0.5);
    background:#15151c;
    box-shadow:0 0 20px rgba(200,169,81,0.05);
    }

    /* ===== BUTTON ===== */

    .btn-login{
    margin-top:10px;
    padding:16px;
    border-radius:12px;
    font-weight:600;
    letter-spacing:1px;
    cursor:pointer;
    border:none;
    background:linear-gradient(135deg,#c8a951,#9a7b30);
    color:#05050a;
    transition:0.3s;
    }

    .btn-login:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(200,169,81,0.3);
    }

    /* ===== REGISTER TEXT ===== */

    .register-text{
    margin-top:35px;
    text-align:center;
    color:#45433d;
    font-size:0.85rem;
    }

    .register-text a{
    color:#c8a951;
    text-decoration:none;
    font-weight:600;
    margin-left:5px;
    }

    /* ===== IMAGE SIDE ===== */

    .login-visual{
    flex:1;
    position:relative;
    overflow:hidden;
    background:#0e0e12;
    }

    .login-visual img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.5) contrast(1.1);
    }

    .login-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to right,#07070a 0%,transparent 30%,transparent 70%,rgba(7,7,10,0.4) 100%);
    }

    .login-visual-text{
    position:absolute;
    bottom:80px;
    left:60px;
    right:60px;
    z-index:5;
    }

    .gold-line{
    width:40px;
    height:1px;
    background:#c8a951;
    margin-bottom:20px;
    }

    .login-visual-text h3{
    font-family:'Playfair Display',serif;
    font-size:2.6rem;
    color:#f0ead8;
    margin-bottom:15px;
    font-weight:400;
    }

    .login-visual-text em{
    color:#c8a951;
    }

    .login-visual-text p{
    color:rgba(240,234,216,0.6);
    font-size:1rem;
    max-width:400px;
    line-height:1.7;
    }

    /* ===== MOBILE ===== */

    @media(max-width:992px){

    .login-section{
    flex-direction:column;
    }

    .login-visual{
    height:260px;
    order:1;
    }

    .login-form-area{
    order:2;
    padding:40px 20px;
    }

    .login-header h2{
    font-size:2rem;
    }

    .login-visual-text{
    left:20px;
    right:20px;
    bottom:20px;
    }

    .login-visual-text h3{
    font-size:1.5rem;
    }

    .login-visual-text p{
    display:none;
    }

    }

</style>

</body>
</html>
