<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/layout :: head('Login - SSartz Gallery')}"></head>
<body class="bg-dark text-white" style="overflow-x: hidden;">

<nav th:replace="~{fragments/layout :: navbar(0)}"></nav>

<section style="display: flex; min-height: 100vh; width: 100vw; align-items: stretch;">

    <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; background: #07070a; z-index: 2;">

        <div style="width: 100%; max-width: 380px;">
            <div style="margin-bottom: 40px; text-align: left;">
                <p style="letter-spacing: 4px; color: #c8a951; font-size: 0.75rem; font-weight: bold; margin-bottom: 10px;">AUTHENTICATION</p>
                <h2 style="font-family: 'Playfair Display', serif; font-size: 2.8rem; line-height: 1.1; color: #f0ead8;">User <em style="color: #c8a951; font-style: italic;">Login</em></h2>
            </div>

            <div th:if="${param.error}" style="background: rgba(255, 77, 77, 0.1); color: #ff4d4d; padding: 12px 16px; border-radius: 8px; margin-bottom: 25px; font-size: 0.85rem; border: 1px solid rgba(255, 77, 77, 0.2); display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-exclamation-circle"></i> Invalid credentials. Please try again.
            </div>

            <form th:action="@{/login}" method="post" style="display: flex; flex-direction: column; gap: 20px;">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="color: #8c8575; font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;">Email Address</label>
                    <input type="email" name="username" placeholder="e.g. artist@ssartz.com" required
                           style="width: 100%; background: #121217; border: 1px solid rgba(255,255,255,0.05); padding: 14px 18px; border-radius: 12px; color: #f0ead8; outline: none; transition: 0.3s; font-family: 'Outfit', sans-serif;">
                </div>

                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="color: #8c8575; font-size: 0.7rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600;">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required
                           style="width: 100%; background: #121217; border: 1px solid rgba(255,255,255,0.05); padding: 14px 18px; border-radius: 12px; color: #f0ead8; outline: none; transition: 0.3s; font-family: 'Outfit', sans-serif;">
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 15px; padding: 16px; border-radius: 12px; font-weight: 600; letter-spacing: 1px; cursor: pointer; border: none; background: linear-gradient(135deg, #c8a951 0%, #9a7b30 100%); color: #05050a; transition: 0.3s;">
                    SIGN IN TO GALLERY
                </button>
            </form>

            <p style="margin-top: 35px; text-align: center; color: #45433d; font-size: 0.85rem; letter-spacing: 0.5px;">
                New to SSartz? <a th:href="@{/register}" style="color: #c8a951; text-decoration: none; font-weight: 600; margin-left: 5px; border-bottom: 1px solid transparent; transition: 0.3s;">Create an account</a>
            </p>
        </div>
    </div>

    <div class="login-visual" style="flex: 1.3; position: relative; background: #0e0e12; overflow: hidden;">
        <img th:src="@{/images/96image.jpeg}" alt="Artistic Animation"
             style="width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5) contrast(1.1);">

        <div style="position: absolute; inset: 0; background: linear-gradient(to right, #07070a 0%, transparent 20%, transparent 80%, rgba(7,7,10,0.4) 100%);"></div>

        <div style="position: absolute; bottom: 80px; left: 60px; right: 60px; z-index: 5;">
            <div style="width: 40px; height: 1px; background: #c8a951; margin-bottom: 20px;"></div>
            <h3 style="font-family: 'Playfair Display', serif; font-size: 2.6rem; color: #f0ead8; margin-bottom: 15px; line-height: 1.2; font-weight: 400;">
                Unveiling the <br> <em style="color: #c8a951;">Hidden Canvas</em>
            </h3>
            <p style="color: rgba(240,234,216,0.6); font-size: 1rem; max-width: 400px; line-height: 1.7; font-weight: 300; letter-spacing: 0.5px;">
                Every login is a new journey into the world of curated masterpieces. Welcome to the soul of art.
            </p>
        </div>
    </div>

</section>

<!--<footer th:replace="~{fragments/layout :: footer}"></footer>-->

<style>
    /* 📱 MOBILE RESPONSIVE LOGIC */
    @media (max-width: 992px) {
        .login-visual { display: none !important; }
        body { overflow-y: auto; }
    }

    /* Input Focus Effects */
    input:focus {
        border-color: rgba(200, 169, 81, 0.5) !important;
        background: #15151c !important;
        box-shadow: 0 0 20px rgba(200, 169, 81, 0.05);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(200, 169, 81, 0.3);
    }
</style>

</body>
</html>
